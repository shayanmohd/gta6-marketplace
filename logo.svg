<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff9f1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d2a2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" fill="#090d14"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#1ecbff" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="256" height="256" fill="url(#grid)" />
  
  <!-- Central hexagon -->
  <g filter="url(#glow)">
    <path d="M 128 40 L 180 70 L 180 130 L 128 160 L 76 130 L 76 70 Z" 
          fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Inner circle with V -->
  <circle cx="128" cy="100" r="35" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- V Letter in center -->
  <text x="128" y="115" font-family="Bebas Neue, sans-serif" font-size="48" font-weight="bold" 
        fill="url(#logoGrad)" text-anchor="middle" filter="url(#glow)">V</text>
  
  <!-- Accent dots -->
  <circle cx="128" cy="45" r="3" fill="#00d2a2" opacity="0.8"/>
  <circle cx="183" cy="100" r="3" fill="#ff6b35" opacity="0.8"/>
  <circle cx="128" cy="155" r="3" fill="#1ecbff" opacity="0.8"/>
  <circle cx="73" cy="100" r="3" fill="#ff9f1c" opacity="0.8"/>
</svg>
